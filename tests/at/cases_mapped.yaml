  - id: case_2003953
    name: 影院主菜单-关于
    module: 窗口操作
    status: active
    steps:
      - step_type: action
        description: 打开影院
        action: session_start
        command: deepin-movie
        wait: 8.0
      - step_type: action
        description: 点击主菜单中关于菜单
        action: dtk_main_menu
        items: ["关于"]
      - step_type: action
        description: 等待菜单弹出
        action: wait
        wait: 2.0
      - step_type: assert
        description: 验证弹出关于窗口
        action: assert_window
        assertion: window_exists
        name_pattern: ".*关于.*|About"
      - step_type: action
        description: 关闭关于窗口
        action: keyboard_press
        key: "escape"
      - step_type: action
        description: 关闭影院
        action: session_stop

