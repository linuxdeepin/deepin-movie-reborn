version: "1"

package:
  id: org.deepin.movie
  name: "deepin-movie"
  version: 6.5.46.1
  kind: app
  description: |
    movie for deepin os.

base: org.deepin.base/25.2.2
runtime: org.deepin.runtime.dtk/25.2.2

command:
  - deepin-movie

build: |
  # 下载和安装依赖
  apt -y install --download-only libmpv-dev libxcb1-dev libxcb-util0-dev libffmpegthumbnailer-dev libxcb-shape0-dev libxcb-ewmh-dev xcb-proto x11proto-record-dev x11-utils libxtst-dev libavcodec-dev libavformat-dev libavutil-dev libpulse-dev libdvdnav-dev libgsettings-qt-dev libva-dev libgstreamer-plugins-base1.0-dev libgstreamer1.0-dev qt6-base-dev qt6-base-dev-tools qt6-base-private-dev qt6-l10n-tools qt6-svg-dev qt6-tools-dev-tools qt6-tools-dev qt6-multimedia-dev libqt6sql6-sqlite libmpris-qt6-dev libqt6opengl6-dev libdtk6gui-dev libdtk6widget-dev libdtk6core-dev libgpuinfo deepin-event-log
  # libxcb1-dev：解决构建失败
  bash ./install_dep /var/cache/apt/archives "$PREFIX" "libxcb1-dev"

  # 调整头文件查找路径
  sed -i "s|/usr/include/glib-2.0|/runtime/include/glib-2.0|g" src/CMakeLists.txt
  sed -i "s|/usr/include/gstreamer-1.0|$PREFIX/include/gstreamer-1.0|g" src/CMakeLists.txt
  sed -i "s|/usr/include/glib-2.0|/runtime/include/glib-2.0|g" src/libdmr/CMakeLists.txt
  sed -i "s|/usr/include/gstreamer-1.0|$PREFIX/include/gstreamer-1.0|g" src/libdmr/CMakeLists.txt

  # 移动部分库到应用库目录，否则无法找到
  mv ${PREFIX}/lib/${TRIPLET}/blas/libblas.* ${PREFIX}/lib/${TRIPLET}
  mv ${PREFIX}/lib/${TRIPLET}/lapack/liblapack.* ${PREFIX}/lib/${TRIPLET}
  ldconfig -C "$LINGLONG_LD_SO_CACHE"

  # 构建
  VERSION=$(head -1 debian/changelog | awk -F'[()]' '{print $2}')
  cmake -B build ${conf_args} \
        -DSYSTEMD_USER_UNIT_DIR=${PREFIX}/lib/systemd/user \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=${PREFIX} \
        -DCMAKE_INSTALL_LIBDIR=${PREFIX}/lib/${TRIPLET} \
        -DVERSION=${VERSION}
  cmake --build build -j`nproc`
  cmake --build build --target install > install.log 2>&1

  # 解决GIO运行问题： Settings schema xxx is not installed
  glib-compile-schemas $PREFIX/share/glib-2.0/schemas

  # 项目生成应用名和动态隐式加载的依赖库，ldd无法找到的其他库
  LDD_FILES=(
    deepin-movie
    libmpv.so
    libgpuinfo.so
    libavcodec.so
    libavutil.so
    libavformat.so
    libgstreamer-1.0.so
    libgstpbutils-1.0.so
    libffmpegthumbnailer.so
    ../libdeepin-event-log.so
  )

  # 生成.install 文件
  bash ./deploy_dep "${LDD_FILES[@]}"

  ID_VALUE=$(awk -F ': ' '/^  id: / {print $2}' linglong.yaml)
  find $PREFIX/bin/xprop >> "${ID_VALUE}.install"

# allow apt download in build and do apt update
buildext:
  apt:
    build_depends:
      - libc6
    depends:
      - ffmpeg